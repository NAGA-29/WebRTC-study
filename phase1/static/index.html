<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Phase 1: シグナリングAPI テスト</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 4px; }
    .section h2 { margin-top: 0; font-size: 1em; color: #555; }
    textarea { width: 100%; height: 80px; font-family: monospace; font-size: 12px; }
    button { padding: 6px 14px; margin: 4px; cursor: pointer; }
    .log { background: #1e1e1e; color: #d4d4d4; padding: 10px; height: 200px; overflow-y: auto;
           font-size: 12px; white-space: pre-wrap; border-radius: 4px; }
    .ok { color: #4ec9b0; }
    .err { color: #f44747; }
    .info { color: #9cdcfe; }
    select { padding: 4px; }
  </style>
</head>
<body>
  <h1>Phase 1: シグナリングAPI テスト UI</h1>
  <p>このページは WebRTCセッションを行いません。<br>
  シグナリングAPIの動作を手動で確認するためのテストUIです。</p>

  <!-- SDP Offer -->
  <div class="section">
    <h2>SDP Offer</h2>
    <textarea id="offerInput" placeholder='{"sdp": "v=0\\r\\no=- ..."}'>{"sdp": "test-offer-data"}</textarea><br>
    <button onclick="postOffer()">POST /offer</button>
    <button onclick="getOffer()">GET /offer</button>
  </div>

  <!-- SDP Answer -->
  <div class="section">
    <h2>SDP Answer</h2>
    <textarea id="answerInput" placeholder='{"sdp": "v=0\\r\\no=- ..."}'>{"sdp": "test-answer-data"}</textarea><br>
    <button onclick="postAnswer()">POST /answer</button>
    <button onclick="getAnswer()">GET /answer</button>
  </div>

  <!-- ICE Candidates -->
  <div class="section">
    <h2>ICE Candidates</h2>
    <textarea id="candidateInput" placeholder='{"candidate": "candidate:..."}'>{"candidate": "test-candidate-data"}</textarea><br>
    <select id="sideSelect">
      <option value="offerer">offerer</option>
      <option value="answerer">answerer</option>
    </select>
    <button onclick="postCandidate()">POST /candidates</button>
    <button onclick="getCandidates()">GET /candidates</button>
  </div>

  <!-- リセット -->
  <div class="section">
    <h2>開発用</h2>
    <button onclick="resetStore()">DELETE /reset（ストアをリセット）</button>
  </div>

  <!-- ログ -->
  <div class="section">
    <h2>ログ</h2>
    <div id="log" class="log"></div>
    <button onclick="clearLog()">ログをクリア</button>
  </div>

  <script>
    // --- ログ出力ユーティリティ ---
    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
      el.scrollTop = el.scrollHeight;
    }
    function clearLog() { document.getElementById('log').innerHTML = ''; }

    // --- API呼び出し関数 ---

    async function postOffer() {
      const body = document.getElementById('offerInput').value;
      log(`POST /offer → ${body}`);
      const res = await fetch('/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, res.ok ? 'ok' : 'err');
    }

    async function getOffer() {
      log('GET /offer');
      const res = await fetch('/offer');
      if (res.status === 204) {
        log('← 204 No Content（Offerはまだ保存されていません）', 'info');
        return;
      }
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, 'ok');
    }

    async function postAnswer() {
      const body = document.getElementById('answerInput').value;
      log(`POST /answer → ${body}`);
      const res = await fetch('/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, res.ok ? 'ok' : 'err');
    }

    async function getAnswer() {
      log('GET /answer');
      const res = await fetch('/answer');
      if (res.status === 204) {
        log('← 204 No Content（Answerはまだ保存されていません）', 'info');
        return;
      }
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, 'ok');
    }

    async function postCandidate() {
      const body = document.getElementById('candidateInput').value;
      const side = document.getElementById('sideSelect').value;
      log(`POST /candidates?side=${side} → ${body}`);
      const res = await fetch(`/candidates?side=${side}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, res.ok ? 'ok' : 'err');
    }

    async function getCandidates() {
      const side = document.getElementById('sideSelect').value;
      log(`GET /candidates?side=${side}`);
      const res = await fetch(`/candidates?side=${side}`);
      const data = await res.json();
      log(`← ${res.status} total=${data.total} candidates=${JSON.stringify(data.candidates)}`, 'ok');
    }

    async function resetStore() {
      log('DELETE /reset');
      const res = await fetch('/reset', { method: 'DELETE' });
      const data = await res.json();
      log(`← ${res.status} ${JSON.stringify(data)}`, res.ok ? 'ok' : 'err');
    }

    log('Phase 1: シグナリングAPIテストUI 起動', 'ok');
    log('各ボタンを押してAPIの動作を確認してください');
  </script>
</body>
</html>
